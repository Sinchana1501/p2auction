<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — p2auction House</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topnav" id="topnav"></div>

<main class="page page-narrow">
  <div class="eyebrow">Account</div>
  <h1>Sign in or <em>register</em></h1>
  <p class="page-sub">You need an account to place bids or list items.</p>

  <div class="panel-box">
    <div class="tab-row">
      <button id="tabSignin" class="active">Sign in</button>
      <button id="tabSignup">Register</button>
    </div>

    <div id="banner" class="banner"></div>

    <form id="signinForm">
      <div class="field">
        <label>Roll number</label>
        <input type="text" id="si-rollno" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="si-password" required>
      </div>
      <button type="submit" class="primary" style="width:100%;">Sign in</button>
    </form>

    <form id="signupForm" style="display:none;">
      <div class="field-row">
        <div class="field"><label>First name</label><input type="text" id="su-fname" required></div>
        <div class="field"><label>Last name</label><input type="text" id="su-lname" required></div>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" id="su-email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="su-password" required>
      </div>
      <div class="field-row">
        <div class="field"><label>Date of birth</label><input type="date" id="su-dob" required></div>
        <div class="field"><label>Roll number</label><input type="text" id="su-rollno" required></div>
      </div>
      <div class="field">
        <label>College</label>
        <input type="text" id="su-college" required>
      </div>
      <button type="submit" class="primary" style="width:100%;">Create account</button>
    </form>
  </div>
</main>

<footer class="site-footer">p2auction — a peer to peer campus marketplace</footer>

<script src="app.js"></script>
<script>
  renderNav(null);

  const session = getSession();
  if (session) {
    window.location.href = "index.html";
  }

  const tabSignin = document.getElementById('tabSignin');
  const tabSignup = document.getElementById('tabSignup');
  const signinForm = document.getElementById('signinForm');
  const signupForm = document.getElementById('signupForm');
  const banner = document.getElementById('banner');

  tabSignin.addEventListener('click', () => {
    tabSignin.classList.add('active');
    tabSignup.classList.remove('active');
    signinForm.style.display = 'block';
    signupForm.style.display = 'none';
    banner.className = 'banner';
  });
  tabSignup.addEventListener('click', () => {
    tabSignup.classList.add('active');
    tabSignin.classList.remove('active');
    signupForm.style.display = 'block';
    signinForm.style.display = 'none';
    banner.className = 'banner';
  });

  signinForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = signinForm.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';
    try {
      const user = await apiRequest('POST', '/signin', {
        rollNo: document.getElementById('si-rollno').value,
        password: document.getElementById('si-password').value,
      });
      setSession(user);
      window.location.href = "index.html";
    } catch (err) {
      banner.className = 'banner failure show';
      banner.textContent = err.message;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in';
    }
  });

  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const submitBtn = signupForm.querySelector('button');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Creating account…';
    try {
      const user = await apiRequest('POST', '/signup', {
        fname: document.getElementById('su-fname').value,
        lname: document.getElementById('su-lname').value,
        email: document.getElementById('su-email').value,
        password: document.getElementById('su-password').value,
        dob: document.getElementById('su-dob').value,
        rollNo: document.getElementById('su-rollno').value,
        college: document.getElementById('su-college').value,
      });
      setSession(user);
      window.location.href = "index.html";
    } catch (err) {
      banner.className = 'banner failure show';
      banner.textContent = err.message;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Create account';
    }
  });
</script>

</body>
</html>
